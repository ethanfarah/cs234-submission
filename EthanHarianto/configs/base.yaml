experiment_name: default

data:
  dataset: squad
  max_prompt_tokens: 1024
  chunk_size: 128
  chunk_overlap: 16
  seed: 42
  train_split: train
  val_split: validation
  max_train_samples: null
  max_val_samples: null

policy:
  arch: DISTILBERT
  hidden_dim: 256
  num_layers: 4
  num_heads: 4
  pretrained_name: distilbert-base-uncased
  ratio_conditioned: false
  dropout: 0.1
  causal: false

reward:
  reward_type: SPARSE
  kl_coeff: 0.01
  compression_penalty: 2.0
  learned_model_path: null
  target_compression_ratio: 0.5
  min_compression_ratio: 0.3
  min_ratio_enforcement_mode: SOFT
  min_ratio_soft_fraction: 0.25

algo:
  algo_type: PPO
  lr: 3.0e-4
  gamma: 1.0
  max_grad_norm: 1.0
  buffer_size: 10000
  batch_size: 32
  num_epochs: 4
  terminal_reward_distribution: LAST_KEPT

llm:
  model_name: meta-llama/Llama-3.1-8B
  max_new_tokens: 256
  do_sample: false
  temperature: 1.0
  top_p: 1.0
  quantize: true

train:
  num_episodes: 10000
  eval_every: 500
  checkpoint_every: 1000
  log_every: 50
  update_batch_episodes: 8
  wandb_project: prompt-compression
  wandb_entity: null
  device: cuda
  seed: 42
  output_dir: outputs
  resume_from: null
