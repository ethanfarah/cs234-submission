reward:
  reward_type: SPARSE
  # ADDITIVE pulls policy toward target_compression_ratio (0.5); MULTIPLICATIVE
  # can collapse to "drop everything" (ratio→0, reward plateau then -5).
  sparse_reward_mode: ADDITIVE
  # Poster-safe default: softer ratio pressure avoids the -0.4 reward basin.
  compression_penalty: 1.0
  min_ratio_enforcement_mode: SOFT
  min_ratio_soft_fraction: 0.25
  # reward = task_score_scale * F1 - penalty + reward_bias. Use scale 20 + bias 0.15 so reward stays positive.
  task_score_scale: 20.0
  reward_bias: 0.15